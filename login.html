<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Planner App</h1>

<input
type="text"
id="loginUser"
placeholder="Username">

<input
type="password"
id="loginPass"
placeholder="Password">

<button
class="primary"
onclick="login()">
Login
</button>

<button
class="secondary"
onclick="location.href='signup.html'">
Create Account
</button>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Add Task</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Add Task</h1>

<input
type="text"
id="task"
placeholder="Task Name">

<select id="priority">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<button
class="primary"
onclick="saveTodo()">
Save Task
</button>

<button
class="secondary"
onclick="location.href='todo.html'">
Back
</button>

</div>

<script src="script.js"></script>

</body>
</html>

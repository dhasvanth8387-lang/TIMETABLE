<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Create Account</h1>

<input
type="text"
id="newUser"
placeholder="Username">

<input
type="password"
id="newPass"
placeholder="Password">

<input
type="password"
id="confirmPass"
placeholder="Confirm Password">

<button
class="secondary"
onclick="signup()">
Create Account
</button>

<button
class="primary"
onclick="location.href='login.html'">
Back
</button>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Add Activity</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Add Activity</h1>

<input
type="text"
id="activity"
placeholder="Activity Name">

<select id="day">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

<input type="text"
id="start"
placeholder="Start Time (Ex: 07:00 PM)">

<input type="text"
id="end"
placeholder="End Time (Ex: 09:00 PM)">

<button
class="primary"
onclick="saveActivity()">
Save Activity
</button>

<button
class="secondary"
onclick="location.href='timetable.html'">
Back
</button>

</div>

<script src="script.js"></script>

</body>
</html>
